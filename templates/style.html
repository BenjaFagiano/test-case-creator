<!DOCTYPE html>
<html>
<head>
    <title>Style Training</title>

    <style>
        body {
            background-color: #282a36;
            color: #f8f8f2;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 700px;
        }

        h2 {
            color: #bd93f9;
        }

        button {
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            background-color: #50fa7b;
            font-weight: bold;
            cursor: pointer;
        }

        .terminal {
            background-color: #1e1f29;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            margin-top: 20px;
        }

        a {
            color: #8be9fd;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
        .navbar {
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #1e1f29;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            box-sizing: border-box;
        }

        .nav-title {
            color: #bd93f9;
            font-weight: bold;
        }

        .nav-link {
            color: #8be9fd;
            text-decoration: none;
            font-weight: bold;
        }

        .nav-link:hover {
            text-decoration: underline;
        }

        .terminal-input-wrapper {
            background-color: #1e1f29;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .terminal-prefix {
            color: #50fa7b;
        }

        .terminal-input {
            background: transparent;
            border: none;
            outline: none;
            color: #f8f8f2;
            font-family: monospace;
            font-size: 16px;
            margin-left: 5px;
            width: 200px;
        }

        .terminal-input::placeholder {
            color: #6272a4;
        }
        
    </style>
</head>

<body>
<div class="container">

    <h2>Style Training</h2>

    <form action="/style/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">Upload Excel</button>
    </form>

    <h3>Uploaded Files</h3>

    <div class="terminal">
        {% if files %}
            {% for file in files %}
                {{ file }} <br>
            {% endfor %}
        {% else %}
            No style files uploaded yet.
        {% endif %}
    </div>

    <br>
        <div class="navbar">
    <div class="nav-title">Style Training</div>
        <div>
            <a href="/" class="nav-link">Generator</a>
        </div>
        </div>
    </div>

</div>
</body>
</html>
